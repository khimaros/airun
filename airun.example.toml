# model to use if the agent doesn't specify one
#default_model = "openai-compatible/qwen3.5-27b:UD-Q4_K_XL"

# max output tokens (including reasoning)
#default_max_tokens = 16384

# tools: register tools with the LLM (default: false, enable with --tools flag)
#[tools]
#read = false

# permissions: control access levels (allow/ask/deny) per tool
# can be a single level or a map of patterns (most specific match wins)
#[permissions]
#read = "allow"
# or with path patterns:
#[permissions.read]
#"*" = "allow"
#"/etc/shadow" = "deny"

